services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - /opt/devsdistro/data/mongodb:/data/db
    networks:
      - devsdistro-internal

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - /opt/devsdistro/data/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - devsdistro-internal

networks:
  devsdistro-internal:
    name: devsdistro-internal
    driver: bridge
