name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
      - 'infra/**'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/anuragpsarmah/devdistro-backend:${{ github.sha }}
            ghcr.io/anuragpsarmah/devdistro-backend:latest

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script: |
            cd /opt/devdistro/repo
            git pull --ff-only
            install -m 755 infra/scripts/deploy_backend.sh /opt/devdistro/scripts/deploy_backend.sh
            /opt/devdistro/scripts/deploy_backend.sh ${{ github.sha }}
